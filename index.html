<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Hours Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <h1>Working Hours Visualizer</h1>

        <div id="input-section">
            <div class="input-group">
                <label for="totalHours">Total Working Hours:</label>
                <input type="number" id="totalHours" min="1" max="100" value="40">
                <span>hours per week</span>
            </div>

            <div class="input-group">
                <label for="lunchBreak">Lunch Break:</label>
                <input type="number" id="lunchBreak" min="0" max="4" value="1" step="0.5">
                <span>hours</span>
            </div>

            <!-- Add after lunch break input -->
            <div class="input-group">
                <label for="startTime">Default Start Time:</label>
                <input type="time" id="startTime" value="09:00">
            </div>

            <div class="input-group">
                <label for="maxHoursPerDay">Maximum Hours Per Day:</label>
                <input type="number" id="maxHoursPerDay" min="1" max="24" value="10" step="0.5">
                <span>hours</span>
            </div>

            <div class="input-group">
                <input type="checkbox" id="includeLunch" checked>
                <label for="includeLunch">Include lunch break in working hours</label>
            </div>

            <div class="input-group">
                <label>Available Days:</label>
                <div id="daysCheckboxes">
                    <!-- Days will be added by JavaScript -->
                </div>
            </div>

            <div id="constraints-section">
                <h3>Time Constraints (Optional)</h3>
                <div id="constraints-container">
                    <div class="constraint">
                        <select class="constraint-day">
                            <option value="">Select day</option>
                        </select>
                        <select class="constraint-type">
                            <option value="until">Work until</option>
                            <option value="from">Work from</option>
                            <option value="max">Max hours</option>
                        </select>
                        <input type="time" class="constraint-time">
                        <input type="number" class="constraint-hours" min="1" max="12" placeholder="hours"
                            style="display:none;">
                        <button type="button" class="remove-constraint">Remove</button>
                    </div>
                </div>
                <button type="button" id="addConstraint">Add Constraint</button>
            </div>

            <button id="calculateSchedule">Calculate Schedule</button>
        </div>

        <div id="visualization-section">
            <h2>Weekly Schedule</h2>
            <div id="schedule-container">
                <!-- Schedule visualization will be added by JavaScript -->
            </div>
            <div id="summary">
                <!-- Summary will be added by JavaScript -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
